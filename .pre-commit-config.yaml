repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: ^dot_claude/modify_settings\.json$
      - id: check-toml

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt
        entry: shfmt -w -i 2 -ci -sr
        language: system
        files: (^|/)(\.chezmoiscripts/.*\.sh|.*\.sh|.*executable_[^/]+)$
        exclude: \.tmpl$

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: (^|/)(\.chezmoiscripts/.*\.sh|.*\.sh|.*executable_[^/]+)$
        exclude: \.tmpl$

      - id: stylua
        name: stylua
        entry: stylua
        language: system
        files: \.lua$
